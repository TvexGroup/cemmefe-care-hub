<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex">
  <title>CEMMEFE | Admin</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #f5f4f6;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .card {
      background: white;
      border-radius: 16px;
      padding: 2.5rem 2rem;
      width: 100%;
      max-width: 360px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    }
    .logo { font-size: 1.1rem; font-weight: 700; color: #2d1b3d; margin-bottom: 0.25rem; }
    .sub { font-size: 0.85rem; color: #9ca3af; margin-bottom: 2rem; }
    label { display: block; font-size: 0.8rem; font-weight: 600; color: #4b5563; margin-bottom: 0.4rem; }
    input[type="password"] {
      width: 100%;
      border: 1.5px solid #e5e7eb;
      border-radius: 8px;
      padding: 0.7rem 1rem;
      font-size: 0.9rem;
      outline: none;
      transition: border-color 0.15s;
    }
    input[type="password"]:focus { border-color: #9b8ea0; }
    button {
      width: 100%;
      background: #9b8ea0;
      color: white;
      border: none;
      border-radius: 8px;
      padding: 0.75rem;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      margin-top: 0.75rem;
      transition: opacity 0.15s;
    }
    button:hover { opacity: 0.9; }
    button:disabled { opacity: 0.6; cursor: not-allowed; }
    .error {
      color: #dc2626;
      font-size: 0.8rem;
      margin-top: 0.75rem;
      display: none;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">CEMMEFE</div>
    <div class="sub">Painel administrativo</div>
    <form id="form">
      <label for="password">Senha</label>
      <input type="password" id="password" placeholder="••••••••" autofocus required>
      <button type="submit" id="btn">Entrar</button>
      <p class="error" id="error">Senha incorreta. Tente novamente.</p>
    </form>
  </div>
  <script>
    document.getElementById('form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('btn');
      const errorEl = document.getElementById('error');
      const password = document.getElementById('password').value;

      btn.disabled = true;
      btn.textContent = 'Verificando...';
      errorEl.style.display = 'none';

      try {
        const res = await fetch('/api/admin-gate', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ password }),
        });

        if (res.ok) {
          window.location.replace('/admin/');
        } else {
          errorEl.style.display = 'block';
          document.getElementById('password').value = '';
          document.getElementById('password').focus();
        }
      } catch {
        errorEl.textContent = 'Erro de conexão. Tente novamente.';
        errorEl.style.display = 'block';
      } finally {
        btn.disabled = false;
        btn.textContent = 'Entrar';
      }
    });
  </script>
</body>
</html>
