<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex" />
    <title>CEMMEFE | Admin</title>
    <script>
      // Redirect to password gate if not authenticated
      if (!document.cookie.split(';').some(c => c.trim().startsWith('cms-auth='))) {
        window.location.replace('/admin/gate.html?from=admin');
      }
    </script>
  </head>
  <body>
    <script src="https://unpkg.com/decap-cms@3.3.3/dist/decap-cms.js"></script>
    <script>
      CMS.init({
        config: {
          load_config_file: false,
          backend: {
            name: 'github',
            repo: 'TvexGroup/cemmefe-care-hub',
            branch: 'main',
            base_url: 'https://cemmefe-care-hub-main.vercel.app',
            auth_endpoint: 'api/auth'
          },
          media_folder: 'public/uploads',
          public_folder: '/uploads',
          locale: 'pt',
          collections: [
            {
              name: 'blog',
              label: 'Posts do Blog',
              label_singular: 'Post do Blog',
              folder: 'src/content/posts',
              create: true,
              delete: true,
              format: 'json',
              extension: 'json',
              slug: '{{slug}}',
              summary: '{{title}} — {{date}}',
              fields: [
                { label: 'Título', name: 'title', widget: 'string' },
                {
                  label: 'Categoria', name: 'category', widget: 'select',
                  options: ['Medicina Fetal', 'Ginecologia', 'Obstetrícia', 'Fertilidade', 'Saúde Mental']
                },
                { label: 'Data', name: 'date', widget: 'string', hint: 'Ex: 15 Mai 2026' },
                { label: 'Resumo', name: 'excerpt', widget: 'text', hint: 'Breve descrição exibida na listagem do blog' },
                { label: 'Conteúdo', name: 'content', widget: 'markdown' }
              ]
            }
          ]
        }
      });
    </script>
  </body>
</html>
